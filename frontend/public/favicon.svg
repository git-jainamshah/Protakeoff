<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
  <!-- Measurement square outline -->
  <rect x="7" y="7" width="18" height="18" rx="2" fill="none" stroke="white" stroke-width="2.2" opacity="0.35"/>
  <!-- Cross-hair / calibration lines -->
  <line x1="16" y1="4"  x2="16" y2="10" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="22" x2="16" y2="28" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="4"  y1="16" x2="10" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="16" x2="28" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3" fill="white"/>
</svg>
