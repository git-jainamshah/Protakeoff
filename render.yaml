services:
  - type: web
    name: protakeoff
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:./prisma/prod.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: FRONTEND_URL
        value: https://protakeoff.onrender.com
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        value: git-jainamshah
      - key: GITHUB_REPO
        value: Protakeoff
